name: Build ARM64 DEB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y clang cmake ninja-build pkg-config libgtk-3-dev \
          libwebkit2gtk-4.1-dev libmpv-dev build-essential libsqlite3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git -b stable
          echo "$GITHUB_WORKSPACE/flutter/bin" >> $GITHUB_PATH

      - name: Build and Package
        run: |
          # 1. Build the binary
          flutter/bin/flutter pub get
          flutter/bin/flutter build linux --release
          
          # 2. Prepare structure for .deb
          # We use /opt/ because Flutter apps need their 'lib' folder kept with them
          mkdir -p debian_pkg/opt/mangayomi
          mkdir -p debian_pkg/usr/bin
          mkdir -p debian_pkg/DEBIAN
          
          # 3. Copy the ENTIRE bundle (This fixes the .so missing error)
          cp -r build/linux/arm64/release/bundle/* debian_pkg/opt/mangayomi/
          
          # 4. Create a symlink so you can run it via 'mangayomi' command
          ln -s /opt/mangayomi/mangayomi debian_pkg/usr/bin/mangayomi
          
          # 5. Create control file with explicit dependencies
          cat <<EOF > debian_pkg/DEBIAN/control
Package: mangayomi
Version: 1.0.0
Section: utils
Priority: optional
Architecture: arm64
Maintainer: yourname
Depends: libgtk-3-0, libwebkit2gtk-4.1-0 | libwebkit2gtk-4.0-37, libmpv2 | libmpv1, libvlc5, libsqlite3-0
Description: Mangayomi ARM64 build with bundled Flutter libraries
EOF
          
          # 6. Build the .deb
          dpkg-deb --build debian_pkg mangayomi_arm64.deb

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mangayomi-deb-arm64
          path: mangayomi_arm64.deb
